services:
  # FastAPI Backend Service
  - type: web
    name: leadagent-backend
    env: docker
    dockerContext: ./backend
    dockerfilePath: ./backend/Dockerfile
    region: oregon
    plan: starter
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: leadagent-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: leadagent-redis
          property: connectionString

  # Background Worker (Signal Pipeline)
  - type: worker
    name: leadagent-worker
    env: docker
    dockerContext: ./backend
    dockerfilePath: ./backend/Dockerfile
    command: python -m app.services.signals.ingestion
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: leadagent-db
          property: connectionString

  # Redis Service
  - type: redis
    name: leadagent-redis
    ipAllowList: []

databases:
  # PostgreSQL Database
  - name: leadagent-db
    databaseName: leadagent
    user: leadagent
    region: oregon
    plan: starter
