version: "1"
services:
  - type: web
    name: leadagent-backend
    runtime: docker
    dockerContext: backend
    dockerfilePath: backend/Dockerfile
    region: oregon
    plan: free
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: leadagent-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: leadagent-redis
          property: connectionString

  - type: worker
    name: leadagent-worker
    runtime: docker
    dockerContext: backend
    dockerfilePath: backend/Dockerfile
    region: oregon
    plan: free
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: leadagent-db
          property: connectionString

  - type: redis
    name: leadagent-redis
    region: oregon
    plan: free
    maxmemoryPolicy: noeviction
    ipAllowList:
      - source: 0.0.0.0/0
        description: internal-access

databases:
  - name: leadagent-db
    databaseName: leadagent
    user: leadagent
    region: oregon
    plan: free
